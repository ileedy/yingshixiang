<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app" id="app">
<div class="page" id="page-settings">
<div class="topbar"><div class="topbar-back" onclick="navigateTo('page-profile')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div><span class="topbar-t">设置</span><div style="width:32px"></div></div>
<div class="card" style="margin:16px;padding:0;overflow:hidden">
  <div class="set-i" onclick="showToast('缓存已清除')"><div class="set-l"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg><span class="set-n">清除缓存</span></div><div style="display:flex;align-items:center;gap:4px"><span style="font-size:13px;color:#999">23.5MB</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>
  <div class="set-i" onclick="showToast('隐私政策')"><div class="set-l"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span class="set-n">隐私政策</span></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  <div class="set-i" onclick="showToast('用户协议')"><div class="set-l"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="set-n">用户协议</span></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  <div class="set-i" onclick="navigateTo('page-about')"><div class="set-l"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span class="set-n">关于我们</span></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  <div class="set-i" onclick="navigateTo('page-feedback')"><div class="set-l"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="set-n">意见反馈</span></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>
<div class="s" style="padding-top:0;padding-bottom:100px">
  <button class="btn-o" style="width:100%;border-color:var(--color-magenta-spark);color:var(--color-magenta-spark)" onclick="showToast('已退出登录')">退出登录</button>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
<script src="../js/common.js"></script>
<script>

function toggleChildMeal(){
  const box=document.getElementById('childMealBox');
  if(!box)return;
  box.classList.toggle('ck');
  const svg=box.querySelector('svg');
  if(svg)svg.style.display=box.classList.contains('ck')?'block':'none';
}
function toggleAddrForm(){
  const f=document.getElementById('addrFormSec');
  if(!f)return;
  f.style.display=f.style.display==='none'?'block':'none';
}
function selectGender(el){selectRadio(el);}
function selectPickupTime(el){selectRadio(el);}
</script>
</body>
</html>
