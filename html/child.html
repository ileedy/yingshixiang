<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app" id="app">
<div class="page" id="page-child">
<div class="topbar"><div class="topbar-back" onclick="navigateTo('page-profile')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div><span class="topbar-t">儿童信息管理</span><div style="width:32px"></div></div>
<div class="s">
  <div style="font-size:14px;color:#999;margin-bottom:16px">添加5岁以下儿童信息，可享受儿童免费餐权益</div>
  <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg></div>
    <div style="flex:1"><div style="font-size:15px;font-weight:600">小明</div><div style="font-size:12px;color:#999">男 · 2024年3月15日 · 2岁3个月</div></div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" cursor="pointer"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </div>
</div>
<div class="s" style="padding-top:0">
  <div style="font-size:15px;font-weight:600;margin-bottom:12px">添加儿童</div>
  <input class="inp" placeholder="姓名" style="margin-bottom:12px">
  <input class="inp" placeholder="出生日期" type="date" style="margin-bottom:12px">
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <div class="radio-i sel" style="flex:1;justify-content:center" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span>男</span></div>
    <div class="radio-i" style="flex:1;justify-content:center" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span>女</span></div>
  </div>
  <button class="btn-f" style="width:100%" onclick="showToast('添加成功')">添加</button>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
<script src="../js/common.js"></script>
</body>
</html>
