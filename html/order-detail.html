<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css?v=2">
</head>
<body>
<div class="app" id="app">
<div class="page active" id="page-order-detail">
<div class="topbar"><div class="topbar-back" onclick="navigateTo('page-orders')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div><span class="topbar-t">订单详情</span><div style="width:32px"></div></div>

<!-- Status Hero -->
<div style="background:var(--gradient-coral-flame);padding:28px 20px 32px;color:#fff">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
    <span style="font-size:18px;font-weight:700;letter-spacing:1px">制作中</span>
  </div>
  <div style="font-size:13px;opacity:.85">您的美食正在用心烹饪中，请耐心等待</div>
  <!-- Pickup Code Highlight -->
  <div style="margin-top:20px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.2)">
    <div>
      <div style="font-size:11px;opacity:.8">您的取餐码</div>
      <div style="font-size:42px;font-weight:700;letter-spacing:4px;line-height:1.2;margin-top:2px">A-086</div>
    </div>
    <div style="width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="this.style.transform='scale(.9)';showToast('已放大')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </div>
  </div>
</div>

<!-- Progress Steps -->
<div style="background:#fff;padding:20px 20px 16px;margin:-12px 16px 0;position:relative;z-index:1;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
  <div class="steps-b" style="padding:0">
    <div class="step-i"><div class="step-ic done"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="step-lb done">已下单</span><div class="step-ln done"></div></div>
    <div class="step-i"><div class="step-ic done"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="step-lb done">已支付</span><div class="step-ln done"></div></div>
    <div class="step-i"><div class="step-ic cur"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg></div><span class="step-lb cur">制作中</span><div class="step-ln"></div></div>
    <div class="step-i"><div class="step-ic pen"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><span class="step-lb">已完成</span></div>
  </div>
</div>

<!-- Order Info -->
<div style="padding:16px 16px 0">
  <div class="card" style="border-radius:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(0,0,0,.04)">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <span style="font-size:15px;font-weight:600">订单信息</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:#999">订单号</span><span style="font-size:13px;font-weight:500;color:var(--color-brandwood)">YSX20260627003</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:#999">下单方式</span><span style="font-size:13px;font-weight:600;color:var(--color-mint-action)">堂食</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:#999">下单时间</span><span style="font-size:13px;color:var(--color-brandwood)">2026-06-27 12:15:30</span></div>
    <div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:#999">支付方式</span><span style="font-size:13px;color:var(--color-brandwood)">微信支付</span></div>
  </div>
</div>

<!-- Dish Details -->
<div style="padding:12px 16px 0">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <div style="width:36px;height:36px;border-radius:10px;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg></div>
    <span style="font-size:15px;font-weight:600">菜品明细</span>
  </div>
  <div class="card" style="padding:0;overflow:hidden;border-radius:16px">
    <div style="display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.04);align-items:center">
      <div style="width:52px;height:52px;border-radius:12px;overflow:hidden;flex-shrink:0"><img src="../image/dish-signature-beef.jpg" style="width:100%;height:100%;object-fit:cover" alt="招牌牛肉面"></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">招牌牛肉面</div><div style="font-size:12px;color:#999;margin-top:2px">中辣 · 加蛋</div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:600;color:var(--color-brandwood)">¥28</div><div style="font-size:12px;color:#999;margin-top:2px">x1</div></div>
    </div>
    <div style="display:flex;gap:12px;padding:14px 16px;align-items:center">
      <div style="width:52px;height:52px;border-radius:12px;overflow:hidden;flex-shrink:0"><img src="../image/dish-iced-plum.jpg" style="width:100%;height:100%;object-fit:cover" alt="冰红茶"></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">冰红茶</div><div style="font-size:12px;color:#999;margin-top:2px">标准 · 冰</div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:600;color:var(--color-brandwood)">¥8</div><div style="font-size:12px;color:#999;margin-top:2px">x1</div></div>
    </div>
  </div>
</div>

<!-- Price Breakdown -->
<div style="padding:12px 16px 0">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <div style="width:36px;height:36px;border-radius:10px;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
    <span style="font-size:15px;font-weight:600">价格明细</span>
  </div>
  <div class="card" style="background:var(--color-sunset-fade);border-radius:16px;border:1px solid rgba(247,59,32,.06)">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">商品小计 (2件)</span><span style="font-size:14px;color:var(--color-brandwood)">¥36.00</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">包装费</span><span style="font-size:14px;color:var(--color-brandwood)">¥2.00</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">优惠券 (满20减5)</span><span style="font-size:14px;color:var(--color-coral-flame);font-weight:500">-¥5.00</span></div>
    <div style="display:flex;justify-content:space-between;border-top:1px dashed rgba(0,0,0,.08);padding-top:12px;margin-top:4px"><span style="font-size:15px;font-weight:600">实付金额</span><span style="font-size:20px;font-weight:700;color:var(--color-coral-flame)">¥33.00</span></div>
  </div>
</div>

<!-- Remark -->
<div style="padding:12px 16px 0">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <div style="width:36px;height:36px;border-radius:10px;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
    <span style="font-size:15px;font-weight:600">备注</span>
  </div>
  <div class="card" style="border-radius:16px">
    <div style="font-size:13px;color:#666;line-height:1.6">多放葱花，面要硬一点，不要香菜</div>
  </div>
</div>

<!-- Actions -->
<div style="padding:20px 16px 32px;display:flex;gap:10px">
  <button class="btn-o btn-s" style="flex:1;padding:12px;border-radius:14px" onclick="showToast('申请退款')">申请退款</button>
  <button class="btn-f btn-s" style="flex:1;padding:12px;border-radius:14px" onclick="reorder()">再来一单</button>
  <button class="btn-o btn-s" style="flex:1;padding:12px;border-radius:14px" onclick="showToast('联系客服')">联系客服</button>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
<script src="../js/common.js"></script>
</body>
</html>
