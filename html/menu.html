<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css?v=2">
</head>
<body>
<div class="app" id="app">
<div class="page active" id="page-menu">
<!-- Top Bar -->
<div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--color-bg);position:sticky;top:0;z-index:100">
  <div class="topbar-back" onclick="navigateTo('page-home')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
  <span style="font-size:17px;font-weight:700;letter-spacing:.5px;color:var(--color-brandwood)">点餐</span>
  <div style="width:36px;height:36px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06)" onclick="showToast('搜索')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
</div>
<!-- Menu Layout -->
<div class="menu-ly" id="menuLayout">
  <div class="menu-sb" id="menuSidebar">
    <div class="menu-sb-i active" data-cat="0" onclick="switchCategory(0)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span>热销推荐</span>
    </div>
    <div class="menu-sb-i" data-cat="1" onclick="switchCategory(1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
      <span>招牌面食</span>
    </div>
    <div class="menu-sb-i" data-cat="2" onclick="switchCategory(2)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg>
      <span>盖浇饭系列</span>
    </div>
    <div class="menu-sb-i" data-cat="3" onclick="switchCategory(3)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>小吃凉菜</span>
    </div>
    <div class="menu-sb-i" data-cat="4" onclick="switchCategory(4)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span>饮品甜点</span>
    </div>
    <div class="menu-sb-i" data-cat="5" onclick="switchCategory(5)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
      <span>超值套餐</span>
    </div>
  </div>
  <div class="menu-ct" id="menuContent"></div>
</div>
<!-- Cart Bar -->
<div class="cbar" id="cartBar" onclick="openCart()">
  <div class="cbar-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg><span class="cbar-cnt" id="cartBarCount" style="display:none">0</span></div>
  <span class="cbar-pr" id="cartBarPrice">¥0.00</span>
  <button class="cbar-btn" onclick="event.stopPropagation();goToCheckout()">去结算</button>
</div>
</div>

<!-- Dish Detail Modal -->
<div class="dish-ov" id="dishOv" onclick="closeDishModal()"></div>
<div class="dish-bs" id="dishModal">
  <div class="dish-bs-scroll" id="dishModalScroll">
    <div class="dish-bs-hero" id="dishModalHero">
      <img src="" alt="" id="dishModalHeroImg">
      <div class="dish-bs-close" onclick="closeDishModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="dish-bs-info">
      <div id="dishModalName" class="dish-bs-name"></div>
      <div id="dishModalDesc" class="dish-bs-desc"></div>
      <div id="dishModalPrice" class="dish-bs-price"></div>
    </div>
    <div style="padding:0 20px 20px">
      <div style="height:1px;background:rgba(0,0,0,.06);margin:16px 0"></div>
      <div>
        <div style="font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          口味选择
        </div>
        <div style="display:flex;gap:8px">
          <div class="radio-i sel" style="flex:1;justify-content:center;margin-bottom:0;padding:10px" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span style="font-size:14px">微辣</span></div>
          <div class="radio-i" style="flex:1;justify-content:center;margin-bottom:0;padding:10px" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span style="font-size:14px">中辣</span></div>
          <div class="radio-i" style="flex:1;justify-content:center;margin-bottom:0;padding:10px" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span style="font-size:14px">特辣</span></div>
        </div>
      </div>
      <div style="margin-top:20px">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 15a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          加料
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="ckb" style="padding:12px;border-radius:14px;background:var(--color-sunset-fade);transition:all .2s ease" onclick="this.querySelector('.ckb-box').classList.toggle('ck');this.style.background=this.querySelector('.ckb-box').classList.contains('ck')?'rgba(247,59,32,.08)':'var(--color-sunset-fade)';this.querySelector('svg').style.display=this.querySelector('.ckb-box').classList.contains('ck')?'block':'none'">
            <div class="ckb-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div style="flex:1;display:flex;justify-content:space-between"><span style="font-size:14px">加蛋</span><span style="font-size:14px;color:var(--color-coral-flame);font-weight:500">+¥2</span></div>
          </div>
          <div class="ckb" style="padding:12px;border-radius:14px;background:var(--color-sunset-fade);transition:all .2s ease" onclick="this.querySelector('.ckb-box').classList.toggle('ck');this.style.background=this.querySelector('.ckb-box').classList.contains('ck')?'rgba(247,59,32,.08)':'var(--color-sunset-fade)';this.querySelector('svg').style.display=this.querySelector('.ckb-box').classList.contains('ck')?'block':'none'">
            <div class="ckb-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div style="flex:1;display:flex;justify-content:space-between"><span style="font-size:14px">加肉</span><span style="font-size:14px;color:var(--color-coral-flame);font-weight:500">+¥5</span></div>
          </div>
          <div class="ckb" style="padding:12px;border-radius:14px;background:var(--color-sunset-fade);transition:all .2s ease" onclick="this.querySelector('.ckb-box').classList.toggle('ck');this.style.background=this.querySelector('.ckb-box').classList.contains('ck')?'rgba(247,59,32,.08)':'var(--color-sunset-fade)';this.querySelector('svg').style.display=this.querySelector('.ckb-box').classList.contains('ck')?'block':'none'">
            <div class="ckb-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div style="flex:1;display:flex;justify-content:space-between"><span style="font-size:14px">加青菜</span><span style="font-size:14px;color:var(--color-coral-flame);font-weight:500">+¥3</span></div>
          </div>
        </div>
      </div>
      <div style="margin-top:20px"><textarea class="txa" placeholder="备注（选填）如：不要香菜、少辣..." rows="2" style="border-radius:12px"></textarea></div>
      <div style="height:80px"></div>
    </div>
  </div>
  <div class="dish-bs-sticky" id="dishModalSticky">
    <img src="" alt="" class="dish-bs-sticky-img" id="dishModalStickyImg">
    <div class="dish-bs-sticky-info">
      <div class="dish-bs-sticky-name" id="dishModalStickyName"></div>
      <div class="dish-bs-sticky-price" id="dishModalStickyPrice"></div>
    </div>
  </div>
  <div id="dishModalFooter" style="padding:12px 20px 20px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,.06)">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:14px;color:#666">数量</span>
      <div class="qty-s">
        <button class="qty-b" onclick="changeModalQty(-1)">-</button>
        <span class="qty-n" id="modalQty">1</span>
        <button class="qty-b" onclick="changeModalQty(1)">+</button>
      </div>
    </div>
    <button class="btn-f" style="padding:12px 28px;border-radius:24px;font-size:15px" onclick="addToCartFromModal()">加入购物车</button>
  </div>
</div>

<!-- Cart Sidebar -->
<div class="cart-ov" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sb" id="cartSidebar">
  <div style="display:flex;justify-content:center;padding:10px 0 6px;cursor:pointer" onclick="closeCart()">
    <div style="width:40px;height:4px;border-radius:2px;background:#ddd"></div>
  </div>
  <div style="padding:4px 16px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,0,0,.04)">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      <span style="font-size:17px;font-weight:700">购物车</span>
    </div>
    <span style="font-size:13px;color:var(--color-coral-flame);cursor:pointer;font-weight:500" onclick="clearCart()">清空</span>
  </div>
  <div id="cartItemsList" style="flex:1;overflow-y:auto;padding:8px 16px"></div>
  <div style="padding:12px 16px 20px;border-top:1px solid rgba(0,0,0,.04);background:var(--color-sunset-fade);border-radius:0 0 24px 24px">
    <textarea class="txa" placeholder="整单备注（选填）" rows="2" style="border-radius:12px;font-size:13px;margin-bottom:12px;background:#fff"></textarea>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <span style="font-size:13px;color:#999">合计</span>
        <span style="font-size:22px;font-weight:700;color:var(--color-coral-flame);margin-left:4px" id="cartSidebarTotal">¥0</span>
      </div>
      <button class="btn-f" style="padding:12px 28px;border-radius:24px;font-size:15px" onclick="goToCheckout()">去结算</button>
    </div>
  </div>
</div>

</div>
<div id="toast" class="toast"></div>
  <div class="bnav" id="bottomNav">
      <div class="ni" onclick="window.location.href='../index.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></div>
      <div class="ni active" onclick="window.location.href='./menu.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><span>点餐</span></div>
      <div class="ni" onclick="window.location.href='./orders.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><span>订单</span></div>
      <div class="ni" onclick="window.location.href='./profile.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
  </div>
<script src="../js/common.js"></script>
<script>

function switchCategory(idx){
  document.querySelectorAll('.menu-sb-i').forEach((s,i)=>s.classList.toggle('active',i===idx));
  renderDishes(idx);
  const ct=document.getElementById('menuContent');
  if(ct)ct.scrollTop=0;
}

function renderDishes(catIdx){
  const c=document.getElementById('menuContent');
  if(!c)return;
  const filtered=dishes.filter(d=>d.cat===catIdx);
  const dishHtml=filtered.map((d,i)=>{
    const extra=getDishExtra(d.id);
    const qty=getCartQty(d.id);
    const qtyHtml=qty>0
      ?`<div class="dc-qty"><button class="dc-qty-b" onclick="event.stopPropagation();updateDishQty(${d.id},-1)">-</button><span class="dc-qty-n">${qty}</span><button class="dc-qty-b" onclick="event.stopPropagation();updateDishQty(${d.id},1)">+</button></div>`
      :`<button class="dc-add" onclick="event.stopPropagation();openDish(${d.id})">+</button>`;
    return`
    <div class="dc" style="animation:fadeSlideUp .35s ease both;animation-delay:${i*0.06}s">
      <div class="dc-img" onclick="openDish(${d.id})"><img src="${d.img}" style="width:100%;height:100%;object-fit:cover;border-radius:14px" alt="${d.name}"></div>
      <div class="dc-info">
        <div>
          <div class="dc-nm">${d.name}</div>
          <div class="dc-ds">${d.desc}</div>
          <div class="dc-meta">
            <span class="dc-star">&#9733; ${extra.rating}</span>
            <span>·</span>
            <span>月售 ${extra.sales}</span>
          </div>
        </div>
        <div class="dc-bt">
          <span class="dc-pr">¥${d.price}</span>
          ${qtyHtml}
        </div>
      </div>
    </div>
  `}).join('');
  const emptyHtml=filtered.length===0?`<div style="text-align:center;padding:60px 20px;color:#ccc"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" style="margin:0 auto 12px;display:block"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><div style="font-size:14px;margin-bottom:8px">该分类暂无商品</div><div style="font-size:12px">去看看其他分类吧～</div></div>`:'';
  c.innerHTML=dishHtml+emptyHtml;
}
renderDishes(0);

function openDish(id){
  currentDish=dishes.find(d=>d.id===id);if(!currentDish)return;
  modalQty=1;
  document.getElementById('modalQty').textContent='1';
  document.getElementById('dishModalHeroImg').src=currentDish.img;
  document.getElementById('dishModalHeroImg').alt=currentDish.name;
  document.getElementById('dishModalStickyImg').src=currentDish.img;
  document.getElementById('dishModalStickyImg').alt=currentDish.name;
  document.getElementById('dishModalName').textContent=currentDish.name;
  document.getElementById('dishModalDesc').textContent=currentDish.desc;
  document.getElementById('dishModalPrice').textContent='¥'+currentDish.price;
  document.getElementById('dishModalStickyName').textContent=currentDish.name;
  document.getElementById('dishModalStickyPrice').textContent='¥'+currentDish.price;
  const scrollEl=document.getElementById('dishModalScroll');
  scrollEl.scrollTop=0;
  const bs=document.getElementById('dishModal');
  bs.classList.remove('scrolled');
  bs.classList.add('active');
  document.getElementById('dishOv').classList.add('active');
  document.body.style.overflow='hidden';
  scrollEl.onscroll=function(){
    if(scrollEl.scrollTop>180)bs.classList.add('scrolled');
    else bs.classList.remove('scrolled');
  };
}
function closeDishModal(){
  const bs=document.getElementById('dishModal');
  bs.classList.remove('active','scrolled');
  document.getElementById('dishOv').classList.remove('active');
  document.getElementById('dishModalScroll').onscroll=null;
  document.body.style.overflow='';
}
function changeModalQty(d){
  modalQty=Math.max(1,modalQty+d);
  document.getElementById('modalQty').textContent=modalQty;
}
function addToCartFromModal(){
  if(!currentDish)return;
  const existing=cart.find(c=>c.id===currentDish.id);
  if(existing)existing.qty+=modalQty;else cart.push({id:currentDish.id,name:currentDish.name,price:currentDish.price,qty:modalQty,img:currentDish.img});
  closeDishModal();
  updateCart();showToast('已加入购物车');
}

function startOrder(type){
  currentOrderType=type;
  navigateTo('page-menu');
  const tabs=document.querySelectorAll('#orderTypeTabs .tab-p');
  tabs.forEach(t=>{t.classList.toggle('active',t.dataset.type===type);});
  switchOrderTypeUI(type);
}

function goToCategory(idx){
  navigateTo('page-menu');
}
</script>
</body>
</html>
