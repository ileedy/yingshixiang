<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app" id="app">
<div class="page active" id="page-success">
<div style="padding:60px 24px;text-align:center">
  <div style="width:80px;height:80px;border-radius:50%;background:var(--color-mint-action);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;animation:bi .5s ease">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div style="font-size:24px;font-weight:700;color:var(--color-coral-flame);letter-spacing:1px">支付成功</div>
  <div style="font-size:14px;color:#999;margin-top:12px">订单号: YSX20260628001</div>
  <div id="successPickup" style="margin-top:32px;background:var(--color-sunset-fade);border-radius:20px;padding:32px 24px">
    <div style="font-size:64px;font-weight:700;color:var(--color-coral-flame);letter-spacing:8px;font-family:monospace">A-086</div>
    <div style="font-size:14px;color:#666;margin-top:12px">出示取餐码给店员</div>
  </div>
  <div id="successDelivery" style="margin-top:32px;display:none">
    <div style="font-size:16px;color:#666">预计送达</div>
    <div style="font-size:36px;font-weight:700;color:var(--color-coral-flame);margin-top:8px">12:30</div>
  </div>
  <div style="display:flex;gap:12px;margin-top:40px">
    <button class="btn-o" style="flex:1" onclick="navigateTo('page-orders')">查看订单</button>
    <button class="btn-f" style="flex:1" onclick="navigateTo('page-home')">返回首页</button>
  </div>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
<script src="../js/common.js"></script>
</body>
</html>
