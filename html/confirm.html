<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app" id="app">
<div class="page" id="page-confirm">
<!-- Top Bar -->
<div style="position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);padding:12px 16px;display:flex;align-items:center;gap:12px">
  <div style="width:36px;height:36px;border-radius:50%;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="navigateTo('page-menu')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <span style="flex:1;font-size:17px;font-weight:700;letter-spacing:.5px">确认订单</span>
</div>
<!-- Order Type Tabs -->
<div style="margin:8px 16px 0;display:flex;gap:8px" id="orderTypeTabs">
  <div class="tab-p active" data-type="dine-in" onclick="switchOrderType(this,'dine-in')" style="flex:1;text-align:center;padding:12px;border-radius:16px;font-size:15px;font-weight:600;color:var(--color-coral-flame);background:linear-gradient(135deg,#fff5f0,#ffe0d3);border:1.5px solid rgba(247,59,32,.15)">堂食</div>
  <div class="tab-p" data-type="pickup" onclick="switchOrderType(this,'pickup')" style="flex:1;text-align:center;padding:12px;border-radius:16px;font-size:15px;font-weight:500;color:#666;background:#f5f5f5;border:1.5px solid transparent">自取</div>
  <div class="tab-p" data-type="delivery" onclick="switchOrderType(this,'delivery')" style="flex:1;text-align:center;padding:12px;border-radius:16px;font-size:15px;font-weight:500;color:#666;background:#f5f5f5;border:1.5px solid transparent">外卖</div>
</div>
<!-- Table Number (Dine-in) -->
<div id="tableNumberSection" style="margin:12px 16px 0;padding:16px;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)">
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    选择桌号
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:8px" id="tableNumberGrid">
    <div class="table-num active" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:600;background:var(--color-sunset-fade);color:var(--color-coral-flame);border:1.5px solid rgba(247,59,32,.2);cursor:pointer">A1</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">A2</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">A3</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">B1</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">B2</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">B3</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">C1</div>
    <div class="table-num" onclick="selectTable(this)" style="min-width:52px;text-align:center;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;background:#f5f5f5;color:#666;border:1.5px solid transparent;cursor:pointer">C2</div>
  </div>
</div>
<!-- Pickup Time -->
<div id="pickupTimeSection" style="display:none;margin:12px 16px 0;padding:16px;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)">
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    取餐时间
  </div>
  <div style="display:flex;gap:8px">
    <div class="radio-i sel" style="flex:1;justify-content:center;border-radius:12px;background:var(--color-sunset-fade)" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span style="font-size:14px">尽快</span></div>
    <div class="radio-i" style="flex:1;justify-content:center;border-radius:12px" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span style="font-size:14px">30分钟后</span></div>
    <div class="radio-i" style="flex:1;justify-content:center;border-radius:12px" onclick="selectRadio(this)"><div class="radio-c"><div class="radio-ci"></div></div><span style="font-size:14px">1小时后</span></div>
  </div>
</div>
<!-- Delivery Address -->
<div id="deliveryAddrSection" style="display:none;margin:12px 16px 0">
  <div style="background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);cursor:pointer;padding:16px" onclick="navigateTo('page-address')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <div style="font-size:15px;font-weight:600">张三 138****8888</div>
          <div style="font-size:13px;color:#666;margin-top:4px">成都市锦江区万象城B1层</div>
        </div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
</div>
<!-- Order Items -->
<div style="margin:12px 16px 0;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:16px">
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    订单明细
  </div>
  <div id="confirmOrderItems">
    <div style="text-align:center;padding:32px 0;color:#ccc">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" style="margin:0 auto 8px;display:block"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <div style="font-size:13px">请先选择商品</div>
    </div>
  </div>
</div>
<!-- Price Breakdown -->
<div style="margin:8px 16px 0;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:16px">
  <div style="background:var(--color-sunset-fade);border-radius:12px;padding:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">商品小计</span><span style="font-size:14px;font-weight:500" id="confirmSubtotal">¥0</span></div>
    <div id="confirmPackRow" style="display:none;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">包装费</span><span style="font-size:14px;font-weight:500">¥2.00</span></div>
    <div id="confirmDelRow" style="display:none;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">配送费</span><span style="font-size:14px;font-weight:500">¥5.00</span></div>
    <div id="confirmDiscRow" style="display:none;justify-content:space-between;margin-bottom:10px"><span style="font-size:14px;color:#666">优惠</span><span style="font-size:14px;color:var(--color-coral-flame);font-weight:500" id="confirmDisc">-¥0</span></div>
    <div style="display:flex;justify-content:space-between;border-top:1px solid rgba(0,0,0,.06);padding-top:12px;margin-top:4px"><span style="font-size:15px;font-weight:600">合计</span><span style="font-size:20px;font-weight:700;color:var(--color-coral-flame)" id="confirmTotal">¥0</span></div>
  </div>
</div>
<!-- Coupon -->
<div style="margin:8px 16px 0;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="openCouponSheet()">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#ffe0d3,#ffb89e);display:flex;align-items:center;justify-content:center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M20 12V8H6a2 2 0 01-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 00-4 0v4h4v-4z"/></svg>
    </div>
    <span style="font-size:14px;font-weight:500">优惠券</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px"><span style="font-size:14px;color:var(--color-coral-flame);font-weight:500" id="selCouponText">选择优惠券</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>
<!-- Tableware & Child Meal -->
<div style="margin:8px 16px 0;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:14px 16px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(0,0,0,.04)">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#fff3e0,#ffe0b2);display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff9800" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
      </div>
      <span style="font-size:14px;font-weight:500">餐具份数</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="changeTableware(-1)">
        <div style="width:28px;height:28px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
      <span style="font-size:15px;font-weight:600;min-width:18px;text-align:center" id="tablewareCount">1</span>
      <div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="changeTableware(1)">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
    </div>
  </div>
  <div class="ckb" onclick="toggleChildMeal()" style="padding:0;border:none;background:none;border-radius:0">
    <div class="ckb-box" id="childMealBox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:600">儿童免费餐</div>
        <div style="font-size:12px;color:#999">(已绑定5岁以下儿童)</div>
      </div>
    </div>
  </div>
</div>
<!-- Remark -->
<div style="margin:8px 16px 0;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:16px">
  <div style="font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    备注
  </div>
  <textarea class="txa" placeholder="如：不要香菜、少油少盐..." rows="2" style="border-radius:12px;background:var(--color-sunset-fade);border:1.5px solid transparent;font-size:14px;padding:12px"></textarea>
</div>
<!-- Payment Method -->
<div style="margin:8px 16px 0;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:16px">
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    支付方式
  </div>
  <div class="radio-i sel" onclick="selectRadio(this)" style="border-radius:12px;padding:14px;margin-bottom:8px;background:var(--color-sunset-fade)">
    <div style="width:32px;height:32px;border-radius:8px;background:#07c160;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="10"/><path d="M8.5 11a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm7 0a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/></svg></div>
    <span style="flex:1;font-size:14px;font-weight:500">微信支付</span><div class="radio-c"><div class="radio-ci"></div></div>
  </div>
  <div class="radio-i" onclick="selectRadio(this)" style="border-radius:12px;padding:14px">
    <div style="width:32px;height:32px;border-radius:8px;background:var(--color-coral-flame);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/></svg></div>
    <span style="flex:1;font-size:14px;font-weight:500">余额支付 (¥86.50)</span><div class="radio-c"><div class="radio-ci"></div></div>
  </div>
</div>
<!-- Bottom Submit -->
<div style="position:sticky;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);padding:12px 16px 24px;box-shadow:0 -4px 20px rgba(0,0,0,.06)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 4px">
    <div style="display:flex;align-items:baseline;gap:2px">
      <span style="font-size:13px;color:#666">合计</span>
      <span style="font-size:22px;font-weight:700;color:var(--color-coral-flame)" id="confirmTotalBottom">¥0</span>
    </div>
    <span style="font-size:12px;color:#999" id="confirmItemCount">共0件</span>
  </div>
  <button class="btn-f" style="width:100%;padding:14px;font-size:16px;border-radius:16px;letter-spacing:1px" id="submitOrderBtn" onclick="submitOrder()">提交订单</button>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
<script src="../js/common.js"></script>
</body>
</html>
