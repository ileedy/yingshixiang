<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app" id="app">
<div class="page" id="page-feedback">
<div class="topbar"><div class="topbar-back" onclick="navigateTo('page-settings')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div><span class="topbar-t">意见反馈</span><div style="width:32px"></div></div>
<div class="s">
  <div style="font-size:15px;font-weight:600;margin-bottom:12px">反馈内容</div>
  <textarea class="txa" placeholder="请告诉我们您的建议或遇到的问题..." rows="5" style="margin-bottom:12px"></textarea>
  <div style="font-size:14px;font-weight:600;margin-bottom:12px">上传图片（选填）</div>
  <div style="display:flex;gap:12px;margin-bottom:24px">
    <div style="width:80px;height:80px;border-radius:12px;border:2px dashed #ddd;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="showToast('选择图片')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
  </div>
  <button class="btn-f" style="width:100%;padding:16px;font-size:16px" onclick="showToast('提交成功，感谢您的反馈！')">提交反馈</button>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
<script src="../js/common.js"></script>
</body>
</html>
