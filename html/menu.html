<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>硬是香面馆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app" id="app">
<div class="page" id="page-menu">
<!-- Top Bar -->
<div style="padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,.04)">
  <div class="topbar-back" onclick="navigateTo('page-home')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
  <span style="font-size:16px;font-weight:700;letter-spacing:1px">点餐</span>
  <div style="width:36px;height:36px;border-radius:12px;background:var(--color-sunset-fade);display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="showToast('搜索')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-coral-flame)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
</div>
<!-- Menu Layout -->
<div class="menu-ly" id="menuLayout">
  <div class="menu-sb" id="menuSidebar">
    <div class="menu-sb-i active" data-cat="0" onclick="switchCategory(0)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span>热销推荐</span>
    </div>
    <div class="menu-sb-i" data-cat="1" onclick="switchCategory(1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
      <span>招牌面食</span>
    </div>
    <div class="menu-sb-i" data-cat="2" onclick="switchCategory(2)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg>
      <span>盖浇饭系列</span>
    </div>
    <div class="menu-sb-i" data-cat="3" onclick="switchCategory(3)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>小吃凉菜</span>
    </div>
    <div class="menu-sb-i" data-cat="4" onclick="switchCategory(4)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span>饮品甜点</span>
    </div>
    <div class="menu-sb-i" data-cat="5" onclick="switchCategory(5)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
      <span>超值套餐</span>
    </div>
  </div>
  <div class="menu-ct" id="menuContent"></div>
</div>
<!-- Cart Bar -->
<div class="cbar" id="cartBar" onclick="openCart()">
  <div class="cbar-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg><span class="cbar-cnt" id="cartBarCount" style="display:none">0</span></div>
  <span class="cbar-pr" id="cartBarPrice">¥0.00</span>
  <button class="cbar-btn" onclick="event.stopPropagation();goToCheckout()">去结算</button>
</div>
</div>

</div>
<div id="toast" class="toast"></div>
  <div class="bnav" id="bottomNav">
      <div class="ni" onclick="window.location.href='../index.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></div>
      <div class="ni active" onclick="window.location.href='./menu.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><span>点餐</span></div>
      <div class="ni" onclick="window.location.href='./orders.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><span>订单</span></div>
      <div class="ni" onclick="window.location.href='./profile.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
  </div>
<script src="../js/common.js"></script>
</body>
</html>
